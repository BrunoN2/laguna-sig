<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAGUNA/SC - Mapa Inteligente</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #020617;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 320px;
            background: radial-gradient(circle at top left, #0f172a 0, #020617 55%);
            border-right: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px;
            gap: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 26px;
            height: 26px;
            border-radius: 999px;
            background: radial-gradient(circle, #22d3ee, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-title {
            font-size: 14px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #9ca3af;
        }

        .logo-sub {
            font-size: 18px;
            font-weight: 600;
            color: #e5e7eb;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: #6b7280;
        }

        .menu-item {
            padding: 10px 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #d1d5db;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .menu-item span.icon {
            font-size: 16px;
        }

        .menu-item.active {
            background: linear-gradient(90deg, rgba(56,189,248,0.15), rgba(129,140,248,0.15));
            border-color: rgba(56,189,248,0.4);
            color: #e5e7eb;
        }

        .menu-item:hover {
            background: rgba(15,23,42,0.8);
            border-color: rgba(31,41,55,0.8);
        }

        .search-box {
            width: 100%;
            padding: 11px 14px;
            background: #020617;
            border: 1px solid #1f2937;
            border-radius: 999px;
            color: #e5e7eb;
            font-size: 13px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: #22d3ee;
            box-shadow: 0 0 0 1px rgba(34,211,238,0.8);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-pill {
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 11px;
            border: 1px solid #1f2937;
            color: #9ca3af;
            cursor: pointer;
            background: rgba(15,23,42,0.8);
            transition: all 0.2s;
        }

        .filter-pill.active {
            background: linear-gradient(90deg, #22d3ee, #6366f1);
            border-color: transparent;
            color: #0b1120;
        }

        .filter-pill:hover {
            border-color: #22d3ee;
        }

        .poi-section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: #6b7280;
        }

        .poi-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 340px;
            overflow-y: auto;
        }

        .poi-item {
            padding: 10px 12px;
            background: rgba(15,23,42,0.9);
            border-radius: 10px;
            border: 1px solid #111827;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }

        .poi-item:hover {
            border-color: #22d3ee;
            transform: translateX(3px);
            background: rgba(15,23,42,1);
        }

        .poi-name {
            font-weight: 500;
            margin-bottom: 2px;
            color: #e5e7eb;
        }

        .poi-type {
            font-size: 11px;
            color: #9ca3af;
        }

        .poi-distance {
            font-size: 11px;
            color: #22d3ee;
            margin-top: 4px;
        }

        /* MAP CONTAINER */
        .map-container {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #020617 0, #000 70%);
        }

        .map-header {
            padding: 14px 22px;
            background: rgba(2,6,23,0.96);
            border-bottom: 1px solid #111827;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(18px);
        }

        .map-title-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .map-title {
            font-size: 17px;
            font-weight: 600;
            color: #e5e7eb;
        }

        .map-subtitle {
            font-size: 11px;
            color: #9ca3af;
        }

        .stats {
            display: flex;
            gap: 16px;
            font-size: 11px;
            color: #9ca3af;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: radial-gradient(circle, #22d3ee, #6366f1);
        }

        #map {
            flex: 1;
        }

        .leaflet-container {
            background: radial-gradient(circle at center, #020617 0, #000 70%);
        }

        .leaflet-popup-content-wrapper {
            background: #020617;
            border-radius: 10px;
            box-shadow: 0 10px 35px rgba(15,23,42,0.9);
            border: 1px solid rgba(56,189,248,0.5);
        }

        .leaflet-popup-content {
            color: #e5e7eb;
            font-size: 12px;
        }

        .leaflet-popup-tip {
            background: #020617;
        }

        .route-legend {
            position: absolute;
            bottom: 70px;
            right: 20px;
            background: rgba(2,6,23,0.9);
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #111827;
            z-index: 400;
            font-size: 11px;
            color: #9ca3af;
            backdrop-filter: blur(18px);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .legend-color {
            width: 18px;
            height: 3px;
            border-radius: 999px;
        }

        .color-main {
            background: linear-gradient(90deg, #22d3ee, #6366f1);
        }

        .color-secondary {
            background: linear-gradient(90deg, #6366f1, #a855f7);
        }

        .color-poi {
            background: linear-gradient(90deg, #ec4899, #f97316);
        }

        /* brilhos nas rotas */
        .route-base {
            filter: drop-shadow(0 0 6px rgba(34,211,238,0.7));
        }

        .route-glow {
            filter: drop-shadow(0 0 12px rgba(56,189,248,1));
        }

        .light-route {
            filter: drop-shadow(0 0 14px rgba(248,250,252,0.95));
            stroke-linecap: round;
        }

        /* BAR INFERIOR */
        .bottom-bar {
            position: absolute;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 401;
        }

        .bottom-search {
            min-width: 280px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(2,6,23,0.94);
            border: 1px solid #111827;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #9ca3af;
            font-size: 12px;
        }

        .bottom-search input {
            background: transparent;
            border: none;
            outline: none;
            color: #e5e7eb;
            font-size: 12px;
            width: 100%;
        }

        .bottom-btn {
            padding: 9px 14px;
            border-radius: 999px;
            font-size: 11px;
            border: 1px solid #111827;
            background: rgba(15,23,42,0.94);
            color: #e5e7eb;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .bottom-btn:hover {
            border-color: #22d3ee;
            background: rgba(15,23,42,1);
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 42vh;
                padding: 16px;
                gap: 16px;
            }

            .map-container {
                height: 58vh;
            }

            .route-legend {
                bottom: 80px;
                right: 10px;
            }

            .bottom-bar {
                bottom: 12px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">★</div>
            <div class="logo-text">
                <div class="logo-title">Laguna</div>
                <div class="logo-sub">Mapa Inteligente</div>
            </div>
        </div>

        <div class="menu">
            <div class="menu-title">Navegação</div>
            <div class="menu-item active">
                <span class="icon">📌</span>
                <span>Pontos de Interesse</span>
            </div>
            <div class="menu-item">
                <span class="icon">🛣️</span>
                <span>Rotas</span>
            </div>
            <div class="menu-item">
                <span class="icon">⚙️</span>
                <span>Configurações</span>
            </div>
        </div>

        <div>
            <input
                    type="text"
                    class="search-box"
                    id="searchInput"
                    placeholder="Buscar rotas ou pontos..."
            >
        </div>

        <div>
            <div class="menu-title" style="margin-bottom: 6px;">Filtros rápidos</div>
            <div class="filters">
                <button class="filter-pill active" data-filter="all">Todos</button>
                <button class="filter-pill" data-filter="landmark">Históricos</button>
                <button class="filter-pill" data-filter="service">Serviços</button>
            </div>
        </div>

        <div>
            <div class="poi-section-title" style="margin-bottom: 8px;">Pontos próximos</div>
            <div class="poi-list" id="poiList">
                <!-- preenchido via JS -->
            </div>
        </div>
    </aside>

    <!-- MAP CONTAINER -->
    <main class="map-container">
        <header class="map-header">
            <div class="map-title-block">
                <div class="map-title">Visão Geral de Laguna</div>
                <div class="map-subtitle">Rotas principais, pontos de interesse e transmissões ao vivo</div>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-dot"></div>
                    <span>6 rotas destacadas</span>
                </div>
                <div class="stat-item">
                    <div class="stat-dot"></div>
                    <span>5 pontos de interesse</span>
                </div>
            </div>
        </header>

        <div id="map"></div>

        <div class="route-legend">
            <div class="legend-item">
                <div class="legend-color color-main"></div>
                <span>Rota Principal</span>
            </div>
            <div class="legend-item">
                <div class="legend-color color-secondary"></div>
                <span>Rota Secundária</span>
            </div>
            <div class="legend-item">
                <div class="legend-color color-poi"></div>
                <span>Ponto de Interesse</span>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="bottom-search">
                🔍
                <input id="bottomSearch" placeholder="Buscar local...">
            </div>
            <button class="bottom-btn">
                🧭 Rota
            </button>
        </div>
    </main>
</div>

<script src="./main.js"></script>
</body>
</html>
